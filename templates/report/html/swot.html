<!-- SWOT Analysis Component -->
<div class="bg-white rounded-xl shadow-lg p-8">
    <h2 class="text-xl font-semibold mb-6 text-gray-900">SWOT 分析</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Strengths -->
        <div class="bg-gradient-to-br from-green-50 to-green-100 border border-green-200 p-6 rounded-xl">
            <h3 class="font-semibold text-green-800 flex items-center gap-2 text-lg">
                <span class="text-2xl">💪</span> Strengths
            </h3>
            <ul class="mt-4 space-y-2">
                {strengths_items}
            </ul>
        </div>

        <!-- Weaknesses -->
        <div class="bg-gradient-to-br from-red-50 to-red-100 border border-red-200 p-6 rounded-xl">
            <h3 class="font-semibold text-red-800 flex items-center gap-2 text-lg">
                <span class="text-2xl">⚠️</span> Weaknesses
            </h3>
            <ul class="mt-4 space-y-2">
                {weaknesses_items}
            </ul>
        </div>

        <!-- Opportunities -->
        <div class="bg-gradient-to-br from-blue-50 to-blue-100 border border-blue-200 p-6 rounded-xl">
            <h3 class="font-semibold text-blue-800 flex items-center gap-2 text-lg">
                <span class="text-2xl">🚀</span> Opportunities
            </h3>
            <ul class="mt-4 space-y-2">
                {opportunities_items}
            </ul>
        </div>

        <!-- Threats -->
        <div class="bg-gradient-to-br from-yellow-50 to-yellow-100 border border-yellow-200 p-6 rounded-xl">
            <h3 class="font-semibold text-yellow-800 flex items-center gap-2 text-lg">
                <span class="text-2xl">⚡</span> Threats
            </h3>
            <ul class="mt-4 space-y-2">
                {threats_items}
            </ul>
        </div>
    </div>
</div>
