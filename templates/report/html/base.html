<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞品分析报告 - {company}</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #1a56db;
            --secondary: #6b7280;
            --accent: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --background: #f9fafb;
            --surface: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
        }
        .text-primary { color: var(--primary); }
        .text-secondary { color: var(--secondary); }
        .text-accent { color: var(--accent); }
        .text-warning { color: var(--warning); }
        .text-danger { color: var(--danger); }
        .bg-primary { background-color: var(--primary); }
        .bg-secondary { background-color: var(--secondary); }
        .bg-accent { background-color: var(--accent); }
        .bg-warning { background-color: var(--warning); }
        .bg-danger { background-color: var(--danger); }
        .border-primary { border-color: var(--primary); }
        .border-secondary { border-color: var(--secondary); }
        .border-accent { border-color: var(--accent); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header Placeholder -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">
                        竞品分析报告: {company}
                    </h1>
                    <p class="mt-2 text-gray-600">生成日期: {date}</p>
                </div>
                <div class="flex gap-2">
                    {header_badges}
                </div>
            </div>
        </div>
    </header>

    <!-- Executive Summary Placeholder -->
    <section class="max-w-7xl mx-auto px-4 py-8">
        {executive_section}
    </section>

    <!-- SWOT Analysis Placeholder -->
    <section class="max-w-7xl mx-auto px-4 py-8">
        {swot_section}
    </section>

    <!-- Feature Matrix Placeholder -->
    <section class="max-w-7xl mx-auto px-4 py-8">
        {feature_matrix_section}
    </section>

    <!-- Pricing Comparison Placeholder -->
    <section class="max-w-7xl mx-auto px-4 py-8">
        {pricing_section}
    </section>

    <!-- Radar Chart Placeholder -->
    <section class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-xl font-semibold mb-6">能力雷达图</h2>
            <div class="max-w-md mx-auto">
                <canvas id="radarChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Confidence Indicator Placeholder -->
    <section class="max-w-7xl mx-auto px-4 py-8">
        {confidence_section}
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            <p>Generated by Competitive-Ops v2 | Powered by Claude Code + ui-ux-pro-max</p>
        </div>
    </footer>

    <script>
        // Radar Chart
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: {
                labels: ['功能', '定价', '用户体验', '技术', '品牌', '增长'],
                datasets: [{
                    label: '我们的产品',
                    data: [4, 3, 5, 4, 3, 4],
                    borderColor: '#1a56db',
                    backgroundColor: 'rgba(26, 86, 219, 0.1)',
                }, {
                    label: '{comp}',
                    data: [5, 4, 4, 5, 4, 3],
                    borderColor: '#6b7280',
                    backgroundColor: 'rgba(107, 114, 128, 0.1)',
                }]
            },
            options: {
                responsive: true,
                scales: { r: { min: 0, max: 5 } }
            }
        });
    </script>

</body>
</html>
